name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'controlai-web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: controlai-web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: controlai-web
        run: pnpm turbo run lint

      - name: Format check
        working-directory: controlai-web
        run: pnpm format:check

      - name: Validate OpenSpec change
        working-directory: controlai-web
        run: npx openspec validate add-controlai-web-skeleton --strict || true

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'controlai-web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: controlai-web
        run: pnpm install --frozen-lockfile

      - name: TypeCheck
        working-directory: controlai-web
        run: pnpm turbo run typecheck

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'controlai-web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: controlai-web
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: controlai-web
        run: pnpm turbo run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run E2E on PRs to main
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:3000
      INSTANCE_TOKEN_KEY: ${{ secrets.INSTANCE_TOKEN_KEY }}
      CRON_SECRET: test-cron-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'controlai-web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: controlai-web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: controlai-web/apps/web
        run: pnpm playwright install chromium --with-deps

      - name: Build
        working-directory: controlai-web
        run: pnpm turbo run build

      - name: Run E2E tests
        working-directory: controlai-web/apps/web
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: controlai-web/apps/web/playwright-report/
          retention-days: 7
